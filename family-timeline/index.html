"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24/G25<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1936 Stephen + Mary Carmella born -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1936<\u002Fdiv>\n          <div class=\"card-title\">Stephen Michael Copley &amp; Mary Carmella Sardo Born<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania · Maryland<\u002Fdiv>\n          <div class=\"card-summary\">Two future branch anchors born in 1936: Stephen Michael Copley (Apr 29) — physicist and professor — and Mary Carmella Sardo (May 3), who will build the Ruland branch.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Stephen Michael Copley<\u002Fspan><span class=\"person-dates\">b. Apr 29, 1936<\u002Fspan><span class=\"person-desc\">— son of Michael Joseph and Marion; physicist, professor, and university administrator. 1st wife: Marcia Thornton (div. 1983); 2nd wife: Judith \"Judy\" Todd (m. 1984).<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Mary Carmella Sardo<\u002Fspan><span class=\"person-dates\">b. May 3, 1936<\u002Fspan><span class=\"person-desc\">— daughter of Nelle and Robert; marries Louis Ruland; Ruland branch matriarch (5 children: Louis III, Robert, Charles, John, Michael)<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G25<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1939 WWII -->\n    <div class=\"world-event-row we-world\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🌍<\u002Fspan><span class=\"we-year\">1939–45<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">World War II — G25 Copleys of fighting age by war's end<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1944 Tom Copley born -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">October 29, 1944<\u002Fdiv>\n          <div class=\"card-title\">Thomas Partlow Copley Born<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">The second son of Michael Joseph and Marion — Thomas Partlow Copley — is born. He will go on to a career in marketing and academia, and father the Tom Copley line of G26.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Thomas Partlow Copley (b. Oct 29, 1944) earned a PhD and built a career in marketing and academia. On March 19, 1967, he married Barbara Dee LaForce. Their three children — Zachary R. (b. 1969), Erin E. (b. 1973), and Charles H. (b. 1985) — form the Tom Copley line of G26.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G25<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1956 Sarah Sardo marries + G25 marriages / Arena branch -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">November 1956<\u002Fdiv>\n          <div class=\"card-title\">Sarah Sardo Marries Matthew Paul Arena<\u002Fdiv>\n          <div class=\"card-location\">Maryland<\u002Fdiv>\n          <div class=\"card-summary\">Sarah Ellen Sardo (b. Dec 19, 1933) marries Matthew Paul Arena, founding the Arena branch of the family — five children: Cathy, Ann Marie, Jim, Matt Jr., and John.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The Arena branch descends from Nelle Copley → Sarah Ellen Sardo → Arena children. The five Arena siblings (Cathy, Ann Marie, Jim, Matt Jr., John) in turn have their own G27 children: Sarah, Martin Jr., James, Matthew, Danielle, Siena, Luca, and others.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G25<\u002Fspan><span class=\"tag\">Sardo-Arena branch<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1967 Tom + Barbara marry -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">March 19, 1967<\u002Fdiv>\n          <div class=\"card-title\">Thomas Partlow Copley Marries Barbara Dee LaForce<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">Tom Copley and Barbara LaForce wed, founding the Tom Copley line of G26 — from which Zach, Erin, and Charles will descend.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Tom (b. Oct 29, 1944) and Barbara's marriage on March 19, 1967 produces three children born over the next two decades — Zachary R. (May 22, 1969, Bellefonte PA), Erin E. (Apr 1973), and Charles H. (Oct 1985).<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G25<\u002Fspan><span class=\"tag\">Marriage<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1968 Thomas E. dies + 1970 Anne dies + 1971 Mary Flesch dies -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1968 · 1970 · 1971<\u002Fdiv>\n          <div class=\"card-title\">Three G24 Siblings Pass<\u002Fdiv>\n          <div class=\"card-location\">Across the United States<\u002Fdiv>\n          <div class=\"card-summary\">Thomas E. Copley (1968), Anne Copley (1970), and Mary Copley Flesch (1971) — three of John and Mary Ellen's children — die within three years, leaving only Nelle and Michael Joseph of the G24 generation.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Thomas E. Copley<\u002Fspan><span class=\"person-dates\">1892–1968<\u002Fspan><span class=\"person-desc\">— married Drusilla; no documented children; died age 76<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Anne Copley<\u002Fspan><span class=\"person-dates\">1895–1970<\u002Fspan><span class=\"person-desc\">— never married; relocated to Albuquerque; died age 75<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Mary Copley Flesch<\u002Fspan><span class=\"person-dates\">1893–1971<\u002Fspan><span class=\"person-desc\">— married Edward Flesch; associated with Albuquerque; died age 78<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1969 Moon Landing -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1969<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Moon Landing — Michael Joseph Copley, USDA chemist, is 70 years old<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Feb 11, 1977 Nelle dies + Marion Partlow dies -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1977<\u002Fdiv>\n          <div class=\"card-title\">Nelle Copley Sardo Dies &amp; Marion Partlow Passes<\u002Fdiv>\n          <div class=\"card-location\">Maryland · Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">February 11, 1977: Ellen Bernadine \"Nelle\" Copley Sardo dies, age 79 — the Maryland branch matriarch is gone. The same year, Marion Elizabeth Partlow, Michael Joseph's wife of 44 years, also dies.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Nelle (Dec 23, 1897 – Feb 11, 1977) spent her career as a registered nurse and educator, building the Maryland branch of the family through her daughters Sarah Ellen (Sardo Arena) and Mary Carmella (Sardo Ruland). She died at 79, her branch by then spanning four generations.<\u002Fp>\n            <p>Marion Elizabeth Partlow Copley (m. 1933, d. 1977) was married to Michael Joseph for 44 years. Her death left Michael Joseph the last surviving member of the G24 generation for the next eleven years.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sep 17, 1988 Michael Joseph dies -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">September 17, 1988<\u002Fdiv>\n          <div class=\"card-title\">Michael Joseph Copley Dies — Last of G24<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">Michael Joseph Copley (b. Sep 16, 1898) dies the day after his 90th birthday — the last surviving child of John and Mary Ellen Dolan Copley. His 90 years bridge the oil-boom West Virginia farm and the space age.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Born September 16, 1898 — the year of the Spanish-American War — Michael Joseph Copley died September 17, 1988, just one day after his 90th birthday. He was the last link to the generation that witnessed the 1900 oil strike, World War I, the Great Depression, World War II, Korea, Vietnam, and the Moon Landing. His career as a research chemist and USDA Director of Research embodied the family's century-long arc from immigrant laborer to federal scientist.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">Last of generation<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 6 — LIVING GENERATIONS ══════════════ -->\n    <div class=\"chapter\" id=\"ch6\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">VI — The Living Generations (G26 → G28)<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G26 Stephen line births -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1959–1970<\u002Fdiv>\n          <div class=\"card-title\">Stephen Copley's Children — G26 Stephen Line<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania · Nationwide<\u002Fdiv>\n          <div class=\"card-summary\">Stephen Michael Copley (b. 1936) and his first wife Marcia Thornton have seven children between 1959 and 1970, forming the largest single cluster of G26 Copleys.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Michael Copley<\u002Fspan><span class=\"person-dates\">b. 1959<\u002Fspan><span class=\"person-desc\">— m. Patti Inman; children: Lauren Copley Meier, Stephen Copley<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Sara Copley Cox<\u002Fspan><span class=\"person-dates\">b. 1961<\u002Fspan><span class=\"person-desc\">— m. R. Cox, 1986; child: Robert \"Bobby\" Cox (b. Oct 3, 1988)<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Philip Copley<\u002Fspan><span class=\"person-dates\">b. 1962<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Paul Copley<\u002Fspan><span class=\"person-dates\">b. 1964<\u002Fspan><span class=\"person-desc\">— m. A.M. Leonhardt; child: Georgia Leonhardt<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Peter Copley<\u002Fspan><span class=\"person-dates\">b. 1966<\u002Fspan><span class=\"person-desc\">— m. K. VanderMolen<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Susan Copley<\u002Fspan><span class=\"person-dates\">b. 1967<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Stephen Joseph Copley<\u002Fspan><span class=\"person-dates\">b. 1970, d. 2023<\u002Fspan><span class=\"person-desc\">— youngest child of Stephen and Marcia; died 2023<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Stephen line<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- May 22, 1969 Zach born -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">May 22, 1969<\u002Fdiv>\n          <div class=\"card-title\">Zachary R. Copley Born — Bellefonte, PA<\u002Fdiv>\n          <div class=\"card-location\">Bellefonte, Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">Zachary R. Copley — son of Thomas Partlow and Barbara LaForce — is born in Bellefonte, PA. He will later become the author and maintainer of this family history research project.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Zach Copley (G26) is the eldest child of Tom and Barbara Copley. His siblings are Erin E. Copley Bird (b. Apr 1973, m. Bryan Bird) and Charles H. Copley (b. Oct 1985). On September 2001, Zach married Wendolyn \"Wendy\" Lorelei Thorpe. Their children are Wyatt Copley (b. 2004) and August \"Augie\" Copley (b. 2008).<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Tom line<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1984 Stephen's 2nd marriage -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1984<\u002Fdiv>\n          <div class=\"card-title\">Stephen Copley Marries Judith \"Judy\" Todd<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">After his divorce from Marcia Thornton in 1983, Stephen Michael Copley marries Judith Ann Todd in 1984. Their daughter Amy E. Copley is born July 11, 1990.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Amy E. Copley Geist<\u002Fspan><span class=\"person-dates\">b. Jul 11, 1990<\u002Fspan><span class=\"person-desc\">— daughter of Stephen and Judy; married Nathan Geist in 2021; mother of William S. Geist (b. Dec 9, 2023)<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G25/G26<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Erin + Charlie (Tom line G26) -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">April 1973 &amp; October 1985<\u002Fdiv>\n          <div class=\"card-title\">Erin E. Copley &amp; Charles H. Copley Born<\u002Fdiv>\n          <div class=\"card-location\">Pennsylvania<\u002Fdiv>\n          <div class=\"card-summary\">Tom and Barbara's younger two children — Erin (b. Apr 1973) and Charles \"Charlie\" (b. Oct 1985) — complete the Tom Copley line of G26, bracketing Zach (b. 1969) across sixteen years.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Erin E. Copley Bird<\u002Fspan><span class=\"person-dates\">b. April 1973<\u002Fspan><span class=\"person-desc\">— married Bryan Bird; mother of Evelyn \"Evy\" Bird (b. 2010) and Samuel Bird (b. 2014)<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Charles H. \"Charlie\" Copley<\u002Fspan><span class=\"person-dates\">b. October 1985<\u002Fspan><span class=\"person-desc\">— youngest child of Tom and Barbara; G26<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Tom line<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sep 2001 Zach marries Wendy -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">September 2001<\u002Fdiv>\n          <div class=\"card-title\">Zachary Copley Marries Wendolyn Thorpe<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">Zach Copley (G26) marries Wendolyn \"Wendy\" Lorelei Thorpe in September 2001 — the same month as a pivotal moment in American history.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Zach and Wendy's marriage in September 2001 begins the next chapter of the Tom Copley line. Their children Wyatt (b. 2004) and August \"Augie\" (b. 2008) are part of the G27 generation.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Marriage<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Erin marries Bryan Bird -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">c. 2000s<\u002Fdiv>\n          <div class=\"card-title\">Erin Copley Marries Bryan Bird<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">Erin E. Copley (b. Apr 1973) marries Bryan Bird, establishing the Bird branch of the G26 Tom line. Their children Evy (b. 2010) and Sam (b. 2014) are part of G27.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Evelyn \"Evy\" Bird<\u002Fspan><span class=\"person-dates\">b. 2010<\u002Fspan><span class=\"person-desc\">— daughter of Erin and Bryan; G27<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Samuel Bird<\u002Fspan><span class=\"person-dates\">b. 2014<\u002Fspan><span class=\"person-desc\">— son of Erin and Bryan; G27<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Marriage<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 9/11 -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">Sep 11, 2001<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">September 11 attacks; War on Terror begins<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Bobby Cox born 1988 (G27 Sara line) -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">October 3, 1988<\u002Fdiv>\n          <div class=\"card-title\">Robert \"Bobby\" Cox Born<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">Robert \"Bobby\" Cox — son of Sara Copley Cox (G26) and R. Cox — is born October 3, 1988, making him technically G27 but older than some of his G26 uncles and aunts.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Bobby's birth in 1988 is a vivid illustration of how generational labels can overlap in a large, spread-out family: he is G27 (grandson of Stephen Michael Copley G25), yet was born before Amy Copley Geist (G26, b. 1990) and Charlie Copley (G26, b. 1985 — just three years earlier).<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G27<\u002Fspan><span class=\"tag\">Sara Cox line<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G27 births 2004–2014 -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">2004–2014<\u002Fdiv>\n          <div class=\"card-title\">G27 Births — Wyatt, Augie, Bobby, Evy, Sam &amp; More<\u002Fdiv>\n          <div class=\"card-location\">Across the United States<\u002Fdiv>\n          <div class=\"card-summary\">A wave of G27 births across the 2000s and 2010s, spanning the Tom Copley and Stephen Copley lines.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Wyatt Copley<\u002Fspan><span class=\"person-dates\">b. 2004<\u002Fspan><span class=\"person-desc\">— son of Zach and Wendy Copley<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">August \"Augie\" Copley<\u002Fspan><span class=\"person-dates\">b. 2008<\u002Fspan><span class=\"person-desc\">— son of Zach and Wendy Copley<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Evelyn \"Evy\" Bird<\u002Fspan><span class=\"person-dates\">b. 2010<\u002Fspan><span class=\"person-desc\">— daughter of Erin Copley Bird and Bryan Bird<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Samuel Bird<\u002Fspan><span class=\"person-dates\">b. 2014<\u002Fspan><span class=\"person-desc\">— son of Erin Copley Bird and Bryan Bird<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Robert \"Bobby\" Cox<\u002Fspan><span class=\"person-dates\">b. Oct 3, 1988<\u002Fspan><span class=\"person-desc\">— son of Sara Copley Cox and R. Cox<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Georgia Leonhardt<\u002Fspan><span class=\"person-dates\">dates not recorded<\u002Fspan><span class=\"person-desc\">— daughter of Paul Copley and A.M. Leonhardt<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Lauren Copley Meier<\u002Fspan><span class=\"person-dates\">dates not recorded<\u002Fspan><span class=\"person-desc\">— daughter of Michael Copley (b. 1959); married Lane Meier; children: Rowan, Elizabeth<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin-top:0.55rem\">The Sardo-Arena and Sardo-Ruland branches also have 18+ G27 grandchildren, including Louis IV, Chris, Taylor, Kelly, Jeffrey, Jamie, Katie, and others. Note: Bobby Cox (b. Oct 3, 1988) is technically G27 but listed separately above due to his earlier birth date.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G27<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 2021 Amy marries Nathan Geist -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">2021<\u002Fdiv>\n          <div class=\"card-title\">Amy Copley Marries Nathan Geist<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">Amy E. Copley (b. Jul 11, 1990) — daughter of Stephen and Judy Copley — marries Nathan Geist in 2021, becoming Amy E. Copley Geist.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Amy (G26) was born July 11, 1990 to Stephen Michael Copley and his second wife Judith Todd. Her 2021 marriage to Nathan Geist adds the Geist name to the family tree. In December 2023, they welcome the newest member of the family.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">Marriage<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 2023 Stephen Joseph dies + William Geist born -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">2023<\u002Fdiv>\n          <div class=\"card-title\">Stephen Joseph Copley Dies &amp; William S. Geist Born<\u002Fdiv>\n          <div class=\"card-location\">United States<\u002Fdiv>\n          <div class=\"card-summary\">2023 holds both a loss and a beginning: Stephen Joseph Copley (b. 1970, G26) passes at age ~53, while William S. Geist — the newest member of the family — is born December 9 to Amy and Nathan.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Stephen Joseph Copley<\u002Fspan><span class=\"person-dates\">b. 1970, d. 2023<\u002Fspan><span class=\"person-desc\">— youngest son of Stephen Michael Copley and Marcia Thornton; G26; died age ~53<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">William S. Geist<\u002Fspan><span class=\"person-dates\">b. December 9, 2023<\u002Fspan><span class=\"person-desc\">— son of Amy E. Copley Geist and Nathan Geist; G27; the newest documented member of the Copley family<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"callout\">William S. Geist, born December 9, 2023, is among the family's newest documented members — eight generations removed from Michael Copley Sr.'s 1838 crossing of the Atlantic. As of April 2026, he is 2 years old.<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G26<\u002Fspan><span class=\"tag\">G27<\u002Fspan><span class=\"tag\">2023<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- G28 - Rowan, Elizabeth and Arena/Ruland G28 -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">Present<\u002Fdiv>\n          <div class=\"card-title\">G28 — The Eighth Generation<\u002Fdiv>\n          <div class=\"card-location\">Across the United States<\u002Fdiv>\n          <div class=\"card-summary\">Children of the G27 generation are already arriving — Rowan Meier, Elizabeth Meier, and the Arena/Ruland G28 cohort including William Calvin Haker, Louis V, Olivia, Luke, Cooper, Paige, Peyton, John, and more.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Lauren Copley Meier (daughter of Michael Copley, b. 1959) has two children: Rowan Meier and Elizabeth Meier, representing the G28 generation in the Stephen/Michael Copley line.<\u002Fp>\n            <p>The Arena-Ruland G28 cohort is extensive, with 20+ members including William \"Calvin\" Haker, Louis V, Olivia, Luke, Cooper, Paige, Peyton, John, and many others — the great-great-grandchildren of Nelle Copley Sardo.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G28<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 7 — RESEARCH FRONTIER ══════════════ -->\n    <div class=\"chapter\" id=\"ch7\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">VII — The Research Frontier<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- April 2026 breakthrough -->\n    <div class=\"event-row\" data-tags=\"ireland research people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span style=\"background: var(--accent2); box-shadow: 0 0 0 2px var(--accent2);\"><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card highlight-card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">April 2026 — Latest Discovery<\u002Fdiv>\n          <div class=\"card-title\">Breakthrough: Irish Origins Confirmed in Kilgefin<\u002Fdiv>\n          <div class=\"card-location\">Fairymount, Kilgefin Parish, County Roscommon, Ireland<\u002Fdiv>\n          <div class=\"card-summary\">A Catholic Copely family confirmed in the exact parish named on Michael Copley Sr.'s gravestone — the strongest evidence yet of Irish origins, nearly 190 years after the crossing.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Through civil registration records, Zach Copley (G26) confirmed the existence of a Catholic Copely family in Fairymount, Kilgefin parish. William Copely (b. ~1794, d. 1864) and his son Michael are the first documented Catholic Copleys in the parish the American family is believed to have come from.<\u002Fp>\n            <div class=\"callout\">The research question that remains: can William Copely of Kilgefin be proven to be the father of Michael Copley Sr.? Primary-record proof of this link would close the most important open question in the family's genealogical history.<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">Research milestone<\u002Fspan><span class=\"tag\">Ireland<\u002Fspan><span class=\"tag\">2026<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://zcopley.github.io/copley-family-research/Topics/Captain-John-Copley-Research\" target=\"_blank\">→ Full investigation: Captain John Copley Research<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"timeline-end\">The archive door remains open — and the story continues.<\u002Fdiv>\n  <\u002Fdiv><!-- /timeline-wrap -->\n<\u002Fdiv><!-- /page-body -->\n\n<script>\n  function toggleCard(card) { card.classList.toggle('expanded'); }\n\n  // Filter\n  document.querySelectorAll('.filter-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));\n      btn.classList.add('active');\n      const filter = btn.dataset.filter;\n      document.querySelectorAll('.event-row, .world-event-row').forEach(row => {\n        if (filter === 'all') {\n          row.classList.remove('hidden');\n        } else {\n          const tags = (row.dataset.tags || '').split(' ');\n          row.classList.toggle('hidden', !tags.includes(filter));\n        }\n      });\n    });\n  });\n\n  // Scroll-in animation for both event-row and world-event-row\n  const observer = new IntersectionObserver(entries => {\n    entries.forEach((entry, i) => {\n      if (entry.isIntersecting) {\n        setTimeout(() => entry.target.classList.add('visible'), i * 40);\n        observer.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });\n\n  document.querySelectorAll('.event-row, .world-event-row').forEach(r => observer.observe(r));\n\n  // Sidebar active chapter\n  const chapters = document.querySelectorAll('.chapter[id]');\n  const links = document.querySelectorAll('.sidebar-link');\n  const scrollObs = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const id = e.target.id;\n        links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));\n      }\n    });\n  }, { rootMargin: '-20% 0px -70% 0px' });\n  chapters.forEach(c => scrollObs.observe(c));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
