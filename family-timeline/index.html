  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7c6e76c1-e730-47bf-9099-0b83642965eb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"230d8334-c1df-401c-902b-8640342b04ee\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"dd4e5875-c79a-431a-a8a8-de9f032fbe2d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --bg: oklch(97.5% 0.012 65);\n    --bg2: oklch(95.5% 0.016 62);\n    --ink: oklch(18% 0.025 50);\n    --ink-muted: oklch(42% 0.02 55);\n    --ink-faint: oklch(65% 0.015 55);\n    --accent: oklch(50% 0.13 38);\n    --accent-light: oklch(92% 0.05 55);\n    --accent2: oklch(50% 0.10 200);\n    --line: oklch(84% 0.022 58);\n    --card: oklch(99.5% 0.006 62);\n    --card-border: oklch(89% 0.018 60);\n    --shadow: oklch(65% 0.03 55 / 0.12);\n    --chapter-bg: oklch(22% 0.025 50);\n    --conf-v-bg: oklch(92% 0.07 145); --conf-v-fg: oklch(30% 0.12 145);\n    --conf-p-bg: oklch(94% 0.07 80);  --conf-p-fg: oklch(36% 0.1 72);\n    --conf-s-bg: oklch(93% 0.06 260); --conf-s-fg: oklch(36% 0.1 260);\n  }\n\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: 'Source Sans 3', sans-serif;\n    background: var(--bg);\n    color: var(--ink);\n    min-height: 100vh;\n    line-height: 1.6;\n  }\n\n  /* ── Header ── */\n  .site-header {\n    background: var(--chapter-bg);\n    color: oklch(96% 0.012 65);\n    padding: 3.5rem 2rem 2.8rem;\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n  }\n  .site-header::before {\n    content: '';\n    position: absolute; inset: 0;\n    background: repeating-linear-gradient(135deg,\n      transparent, transparent 60px,\n      oklch(100% 0 0 / 0.025) 60px, oklch(100% 0 0 / 0.025) 61px);\n  }\n  .site-header h1 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(2rem, 5vw, 3.2rem);\n    font-weight: 700; letter-spacing: -0.01em; position: relative;\n  }\n  .site-header .subtitle {\n    margin-top: 0.5rem; font-size: 0.92rem; font-weight: 300;\n    opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; position: relative;\n  }\n  .site-header .byline { margin-top: 1rem; font-size: 0.85rem; opacity: 0.5; position: relative; }\n  .header-rule { width: 48px; height: 2px; background: var(--accent); margin: 1.2rem auto 0; opacity: 0.9; position: relative; }\n\n  /* ── Legend ── */\n  .legend {\n    display: flex; justify-content: center; align-items: center;\n    gap: 1rem; padding: 0.75rem 1.5rem;\n    background: var(--bg2); border-bottom: 1px solid var(--card-border); flex-wrap: wrap;\n  }\n  .legend-section { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }\n  .legend-divider { width: 1px; height: 18px; background: var(--card-border); }\n  .legend-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }\n  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; color: var(--ink-muted); }\n  .we-swatch { width: 8px; height: 8px; border-radius: 50%; }\n\n  /* ── Filter bar ── */\n  .filter-bar {\n    display: flex; justify-content: center; gap: 0.4rem;\n    padding: 0.85rem 1rem; background: var(--bg2);\n    border-bottom: 1px solid var(--card-border);\n    flex-wrap: wrap; position: sticky; top: 0; z-index: 50;\n    backdrop-filter: blur(4px);\n  }\n  .filter-btn {\n    background: none; border: 1.5px solid var(--card-border); border-radius: 999px;\n    padding: 0.26rem 0.85rem;\n    font-family: 'Source Sans 3', sans-serif; font-size: 0.78rem; font-weight: 500;\n    color: var(--ink-muted); cursor: pointer; transition: all 0.16s ease; letter-spacing: 0.03em;\n  }\n  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }\n  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }\n\n  /* ── Page body ── */\n  .page-body { display: flex; max-width: 1100px; margin: 0 auto; position: relative; }\n\n  /* ── Sidebar ── */\n  .sidebar {\n    width: 175px; flex-shrink: 0;\n    padding: 2.5rem 0 4rem 1.5rem;\n    position: sticky; top: 88px; align-self: flex-start;\n    max-height: calc(100vh - 100px); overflow-y: auto;\n  }\n  .sidebar-title { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 0.75rem; }\n  .sidebar-link {\n    display: block; font-size: 0.77rem; color: var(--ink-faint); text-decoration: none;\n    padding: 0.28rem 0 0.28rem 0.75rem;\n    border-left: 2px solid var(--line); margin-bottom: 0.1rem;\n    transition: color 0.15s, border-color 0.15s; line-height: 1.3;\n  }\n  .sidebar-link:hover { color: var(--accent); border-color: var(--accent); }\n  .sidebar-link.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }\n\n  /* ── Timeline ── */\n  .timeline-wrap {\n    flex: 1; padding: 2.5rem 1.5rem 6rem; position: relative; min-width: 0;\n  }\n  .timeline-wrap::before {\n    content: ''; position: absolute;\n    left: 50%; top: 2.5rem; bottom: 3rem; width: 2px;\n    background: linear-gradient(to bottom, transparent, var(--line) 4%, var(--line) 96%, transparent);\n    transform: translateX(-50%);\n  }\n\n  /* ── Chapter ── */\n  .chapter {\n    display: flex; align-items: center; gap: 0.8rem;\n    margin: 3.5rem 0 1.4rem; position: relative; z-index: 2; scroll-margin-top: 120px;\n  }\n  .chapter:first-child { margin-top: 0.5rem; }\n  .chapter-label {\n    background: var(--chapter-bg); color: oklch(96% 0.01 65);\n    font-family: 'Playfair Display', serif; font-size: 0.77rem; font-weight: 600;\n    letter-spacing: 0.09em; text-transform: uppercase;\n    padding: 0.28rem 0.95rem; border-radius: 999px; white-space: nowrap;\n  }\n  .chapter-rule { flex: 1; height: 1px; background: var(--line); }\n\n  /* ── Family Event Row ── */\n  .event-row {\n    display: grid; grid-template-columns: 1fr 40px 1fr;\n    margin-bottom: 1.3rem; align-items: start;\n    position: relative;\n    opacity: 0; transform: translateY(14px);\n    transition: opacity 0.4s ease, transform 0.4s ease;\n  }\n  .event-row.visible { opacity: 1; transform: none; }\n  .event-row.hidden { display: none; }\n\n  .event-dot {\n    display: flex; align-items: flex-start; justify-content: center; padding-top: 1.15rem;\n  }\n  .event-dot span {\n    width: 11px; height: 11px; border-radius: 50%;\n    background: var(--accent); border: 2.5px solid var(--bg);\n    box-shadow: 0 0 0 2px var(--accent); flex-shrink: 0; transition: transform 0.2s;\n  }\n  .event-row:hover .event-dot span { transform: scale(1.35); }\n\n  .event-left  { grid-column: 1; padding-right: 1.4rem; }\n  .event-right { grid-column: 3; padding-left:  1.4rem; }\n\n  /* ── Card ── */\n  .card {\n    background: var(--card); border: 1px solid var(--card-border); border-radius: 10px;\n    padding: 1.05rem 1.2rem 0.85rem; cursor: pointer;\n    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;\n  }\n  .card:hover { box-shadow: 0 5px 22px var(--shadow); transform: translateY(-2px); border-color: var(--accent-light); }\n  .card.expanded { border-color: var(--accent-light); box-shadow: 0 5px 22px var(--shadow); }\n\n  .card-year {\n    font-family: 'Playfair Display', serif; font-size: 0.73rem; font-weight: 700;\n    letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.18rem;\n  }\n  .card-title {\n    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600;\n    line-height: 1.3; color: var(--ink); margin-bottom: 0.12rem;\n  }\n  .card-location {\n    font-size: 0.75rem; color: var(--ink-faint); margin-bottom: 0.42rem;\n    display: flex; align-items: center; gap: 0.3rem;\n  }\n  .card-location::before { content: '📍'; font-size: 0.65rem; }\n  .card-summary { font-size: 0.86rem; color: var(--ink-muted); line-height: 1.55; }\n\n  .card-toggle {\n    display: flex; align-items: center; gap: 0.35rem; margin-top: 0.52rem;\n    font-size: 0.72rem; color: var(--ink-faint); user-select: none;\n  }\n  .card-toggle svg { transition: transform 0.2s; flex-shrink: 0; }\n  .card.expanded .card-toggle svg { transform: rotate(180deg); }\n  .card.expanded .card-toggle { color: var(--accent); }\n\n  .card-detail {\n    font-size: 0.85rem; color: var(--ink-muted); line-height: 1.65;\n    margin-top: 0.82rem; padding-top: 0.82rem; border-top: 1px solid var(--card-border);\n    display: none;\n  }\n  .card.expanded .card-detail { display: block; }\n  .card-detail p { margin-bottom: 0.52rem; }\n  .card-detail p:last-child { margin-bottom: 0; }\n\n  .detail-row { display: flex; gap: 0.5rem; margin-top: 0.7rem; flex-wrap: wrap; align-items: center; }\n\n  .confidence {\n    display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.7rem;\n    padding: 0.13rem 0.52rem; border-radius: 999px; font-weight: 600;\n  }\n  .conf-verified    { background: var(--conf-v-bg); color: var(--conf-v-fg); }\n  .conf-plausible   { background: var(--conf-p-bg); color: var(--conf-p-fg); }\n  .conf-speculative { background: var(--conf-s-bg); color: var(--conf-s-fg); }\n\n  .tag {\n    display: inline-block; font-size: 0.68rem; padding: 0.1rem 0.48rem;\n    border-radius: 999px; border: 1px solid var(--card-border);\n    color: var(--ink-faint); font-weight: 500; letter-spacing: 0.03em;\n  }\n\n  .source-link {\n    font-size: 0.73rem; color: var(--accent); text-decoration: none;\n    display: inline-flex; align-items: center; gap: 0.2rem;\n    margin-top: 0.5rem; opacity: 0.8; transition: opacity 0.15s;\n  }\n  .source-link:hover { opacity: 1; text-decoration: underline; }\n\n  .people-list { margin-top: 0.6rem; }\n  .person-item {\n    display: flex; align-items: baseline; gap: 0.4rem;\n    margin-bottom: 0.28rem; font-size: 0.83rem;\n  }\n  .person-name { font-weight: 600; color: var(--ink); }\n  .person-dates { font-size: 0.74rem; color: var(--ink-faint); }\n  .person-desc { color: var(--ink-muted); }\n\n  .callout {\n    background: var(--accent-light); border-left: 3px solid var(--accent);\n    border-radius: 0 6px 6px 0; padding: 0.48rem 0.72rem; margin: 0.58rem 0;\n    font-size: 0.82rem; color: var(--ink-muted); line-height: 1.5;\n  }\n\n  .card.context-card { background: oklch(97% 0.01 60); border-style: dashed; }\n  .card.context-card .card-year { color: var(--ink-faint); }\n  .card.highlight-card { border-color: oklch(82% 0.08 200); }\n  .card.highlight-card .card-year { color: var(--accent2); }\n\n  /* ══════════════════════════════════════════════════\n     WORLD EVENT MARKERS\n  ══════════════════════════════════════════════════ */\n  .world-event-row {\n    margin: 0.2rem 0 0.5rem;\n    opacity: 0; transform: translateY(8px);\n    transition: opacity 0.35s ease, transform 0.35s ease;\n    position: relative; z-index: 2;\n  }\n  .world-event-row.visible { opacity: 1; transform: none; }\n  .world-event-row.hidden { display: none; }\n\n  .world-event-inner {\n    display: flex; align-items: center; position: relative;\n  }\n  /* faint rule across the full width */\n  .world-event-inner::before {\n    content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px;\n    background: var(--we-color, #aaa); opacity: 0.18; z-index: 0;\n  }\n\n  .we-side { flex: 1; display: flex; z-index: 1; }\n  .we-left  { justify-content: flex-end; padding-right: 0.55rem; }\n  .we-right { justify-content: flex-start; padding-left: 0.55rem; }\n\n  .we-center {\n    flex-shrink: 0; width: 40px; display: flex;\n    justify-content: center; align-items: center; z-index: 1;\n  }\n  .we-center span {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--we-color, #aaa);\n    border: 2px solid var(--bg);\n    box-shadow: 0 0 0 1.5px var(--we-color, #aaa);\n  }\n\n  .we-pill {\n    display: inline-flex; align-items: center; gap: 0.32rem;\n    background: var(--bg); border: 1px solid var(--we-color, #aaa);\n    border-radius: 999px; padding: 0.2rem 0.7rem 0.2rem 0.45rem;\n    font-size: 0.73rem; color: var(--ink-muted); white-space: nowrap;\n    z-index: 1; cursor: default; transition: box-shadow 0.15s, background 0.15s;\n    max-width: 100%;\n  }\n  .we-pill:hover { background: oklch(98% 0.01 65); box-shadow: 0 2px 10px oklch(0% 0 0 / 0.08); }\n  .we-flag  { font-size: 0.82rem; line-height: 1; }\n  .we-year  { font-weight: 700; color: var(--we-color); font-size: 0.7rem; letter-spacing: 0.04em; }\n  .we-sep   { color: var(--ink-faint); font-size: 0.72rem; }\n  .we-text  { color: var(--ink-muted); }\n\n  /* national color themes */\n  .we-us    { --we-color: oklch(46% 0.13 252); }\n  .we-ie    { --we-color: oklch(42% 0.14 145); }\n  .we-gb    { --we-color: oklch(42% 0.13 18);  }\n  .we-ie-gb { --we-color: oklch(44% 0.10 80);  }\n  .we-world { --we-color: oklch(46% 0.09 300);  }\n\n  /* ── Footer ── */\n  .timeline-end {\n    text-align: center; padding: 2rem 0 1rem;\n    font-family: 'Playfair Display', serif; font-style: italic;\n    color: var(--ink-faint); font-size: 0.95rem;\n  }\n\n  @media (max-width: 720px) {\n    .sidebar { display: none; }\n    .timeline-wrap::before { left: 20px; }\n    .event-row { grid-template-columns: 36px 1fr; }\n    .event-dot { grid-column: 1; }\n    .event-left, .event-right { grid-column: 2; padding-left: 0.9rem; padding-right: 0; }\n    .event-row > .event-left:first-child { display: none; }\n    .we-side.we-left { display: none; }\n    .we-center { display: none; }\n    .we-side.we-right { padding-left: 0; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"site-header\">\n  <h1>The Copley Family<\u002Fh1>\n  <p class=\"subtitle\">County Roscommon · Lewis County, West Virginia · Across America<\u002Fp>\n  <div class=\"header-rule\"><\u002Fdiv>\n  <p class=\"byline\">Six generations · 1794 to the present · Documented by Zach Copley (G26)<\u002Fp>\n<\u002Fheader>\n\n<div class=\"legend\">\n  <span class=\"legend-label\">Confidence:<\u002Fspan>\n  <div class=\"legend-section\">\n    <div class=\"legend-item\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><\u002Fdiv>\n    <div class=\"legend-item\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><\u002Fdiv>\n    <div class=\"legend-item\"><span class=\"confidence conf-speculative\">❓ Speculative<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"legend-divider\"><\u002Fdiv>\n  <span class=\"legend-label\">World Events:<\u002Fspan>\n  <div class=\"legend-section\">\n    <div class=\"legend-item\"><span class=\"we-swatch\" style=\"background:oklch(46% 0.13 252)\"><\u002Fspan>US<\u002Fdiv>\n    <div class=\"legend-item\"><span class=\"we-swatch\" style=\"background:oklch(42% 0.14 145)\"><\u002Fspan>Ireland<\u002Fdiv>\n    <div class=\"legend-item\"><span class=\"we-swatch\" style=\"background:oklch(42% 0.13 18)\"><\u002Fspan>Britain<\u002Fdiv>\n    <div class=\"legend-item\"><span class=\"we-swatch\" style=\"background:oklch(46% 0.09 300)\"><\u002Fspan>Global<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"filter-bar\">\n  <button class=\"filter-btn active\" data-filter=\"all\">All<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"ireland\">🇮🇪 Ireland<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"immigration\">⛵ Immigration<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"west-virginia\">⛏ West Virginia<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"oil\">🛢 Oil Strike<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"people\">👤 Births &amp; Deaths<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"research\">🔍 Research<\u002Fbutton>\n  <button class=\"filter-btn\" data-filter=\"world\">🌍 World Events<\u002Fbutton>\n<\u002Fdiv>\n\n<div class=\"page-body\">\n  <nav class=\"sidebar\" id=\"sidebar\">\n    <div class=\"sidebar-title\">Chapters<\u002Fdiv>\n    <a class=\"sidebar-link\" href=\"#ch1\">I · Irish Roots<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch2\">II · The Crossing<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch3\">III · Railroad Days<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch4\">IV · Oil &amp; Loss<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch5\">V · New Generations<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch6\">VI · Living Generations<\u002Fa>\n    <a class=\"sidebar-link\" href=\"#ch7\">VII · Research<\u002Fa>\n  <\u002Fnav>\n\n  <div class=\"timeline-wrap\" id=\"timeline\">\n\n    <!-- ══════════════ CHAPTER 1 — IRISH ROOTS ══════════════ -->\n    <div class=\"chapter\" id=\"ch1\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">I — Irish Roots<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1800 Act of Union -->\n    <div class=\"world-event-row we-gb\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇬🇧<\u002Fspan><span class=\"we-year\">1800<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Acts of Union: Ireland absorbed into the United Kingdom<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- c.1794 William Copely -->\n    <div class=\"event-row\" data-tags=\"ireland people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">c. 1794<\u002Fdiv>\n          <div class=\"card-title\">William Copely Born — Kilgefin<\u002Fdiv>\n          <div class=\"card-location\">Fairymount, Kilgefin Parish, County Roscommon, Ireland<\u002Fdiv>\n          <div class=\"card-summary\">The earliest documented Catholic Copely in the family's ancestral parish — a crucial anchor confirmed 230 years later by civil registration records.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>William Copely (b. ~1794, d. 1864) and his son Michael are the first confirmed Catholic Copleys in Kilgefin parish. His existence — confirmed through Irish civil registration records in April 2026 — is the strongest link yet to County Roscommon. Note: Irish records use \"Copely\" (one 'e'), while the American branch standardized to \"Copley.\"<\u002Fp>\n            <div class=\"callout\">The connection between William Copely (Kilgefin) and Michael Copley Sr. (Lewis County) has not yet been proven by primary record — but the proximity of names, dates, and place makes this the strongest current hypothesis for Michael's parentage.<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G23 origins<\u002Fspan><span class=\"tag\">Roscommon<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://zcopley.github.io/copley-family-research/Topics/Captain-John-Copley-Research\" target=\"_blank\">→ Captain John Copley Research<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1829 Catholic Emancipation -->\n    <div class=\"world-event-row we-gb\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇬🇧🇮🇪<\u002Fspan><span class=\"we-year\">1829<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Catholic Emancipation Act: Catholics gain right to hold public office<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- c.1808–1813 siblings -->\n    <div class=\"event-row\" data-tags=\"ireland people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">c. 1808–1813<\u002Fdiv>\n          <div class=\"card-title\">The Copley Siblings — Born in Roscommon<\u002Fdiv>\n          <div class=\"card-location\">Kilgefin Parish, County Roscommon, Ireland<\u002Fdiv>\n          <div class=\"card-summary\">Bridget, Catherine \"Kitty,\" and Michael Copley grow up in western Roscommon — the nucleus of the family's emigration story.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Bridget Copley Reynolds<\u002Fspan><span class=\"person-dates\">b. c. 1808<\u002Fspan><span class=\"person-desc\">— emigrated; U.S. descendants need reconstruction<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Catherine \"Kitty\" Copley Hannon<\u002Fspan><span class=\"person-dates\">b. c. 1811<\u002Fspan><span class=\"person-desc\">— immigration details unresolved (Q8/Q10)<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Michael Copley Sr.<\u002Fspan><span class=\"person-dates\">1813–1897<\u002Fspan><span class=\"person-desc\">— patriarch who settled in Lewis County, WV<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Patrick Copley<\u002Fspan><span class=\"person-dates\">d. 1865<\u002Fspan><span class=\"person-desc\">— co-purchaser of the 1843 land agreement<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">William Copley<\u002Fspan><span class=\"person-dates\">dates unknown<\u002Fspan><span class=\"person-desc\">— oral history links him to anti-tithe activism and possible transportation to Australia<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"callout\">William Copley's possible involvement in anti-tithe activism and Australian transportation is an extraordinary story — but remains speculative pending documentation (Q6).<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><span class=\"tag\">G23<\u002Fspan><span class=\"tag\">Siblings<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- c.1823 Ann born -->\n    <div class=\"event-row\" data-tags=\"ireland people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">c. 1823<\u002Fdiv>\n          <div class=\"card-title\">Ann Elizabeth Munday Born<\u002Fdiv>\n          <div class=\"card-location\">Kinawley, County Fermanagh, Ireland<\u002Fdiv>\n          <div class=\"card-summary\">Ann Munday (or Murray) — future matriarch of the American family — is born in Fermanagh. Family memory holds that her father drowned in the Potomac far from home.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Ann Elizabeth Munday (1823–1909) would become the matriarch of the Lewis County branch. Her maiden name is recorded as \"Munday\" in secondary family sources, with \"Murray\" now considered equally likely — neither has been confirmed by primary record (Q3, Q11, Q14). The story of her father's death in the Potomac is vivid oral family memory — the kind of detail that often preserves emotional truth even when documentation lags.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-speculative\">❓ Speculative<\u002Fspan><span class=\"tag\">G23<\u002Fspan><span class=\"tag\">Fermanagh<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1831 Tithe War -->\n    <div class=\"world-event-row we-ie\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇮🇪<\u002Fspan><span class=\"we-year\">1831–36<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Tithe War: mass Irish resistance against church taxes on Catholics<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1820s-30s agrarian strain -->\n    <div class=\"event-row\" data-tags=\"ireland\">\n      <div class=\"event-left\">\n        <div class=\"card context-card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1820s–1830s<\u002Fdiv>\n          <div class=\"card-title\">Tithe Wars &amp; Agrarian Strain<\u002Fdiv>\n          <div class=\"card-location\">County Roscommon, Ireland<\u002Fdiv>\n          <div class=\"card-summary\">Catholic families face rising tithe demands, tenancy insecurity, and organized agrarian resistance — the conditions that make departure thinkable.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Historical context<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The Tithe War (1831–1836) was a nationwide campaign of resistance by Irish Catholics against the obligation to pay tithes to the Church of Ireland. In Roscommon, local agrarian movements added further pressure on Catholic tenants. It is in this climate that the Copley departures must be understood — not as adventure, but as a response to structural forces making life untenable. The possible involvement of brother William in anti-tithe activity fits this context precisely.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Historical context<\u002Fspan><span class=\"tag\">Ireland<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://titheapplotmentbooks.nationalarchives.ie/pagestab/Roscommon/\" target=\"_blank\">→ Tithe Applotment Books (Roscommon)<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span style=\"background:var(--ink-faint); box-shadow:0 0 0 2px var(--ink-faint)\"><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 2 — THE CROSSING ══════════════ -->\n    <div class=\"chapter\" id=\"ch2\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">II — The Atlantic Crossing<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1837 Patrick & Bridget -->\n    <div class=\"event-row\" data-tags=\"immigration\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1837<\u002Fdiv>\n          <div class=\"card-title\">Patrick &amp; Bridget Sail — <em>Kutusoff<\u002Fem><\u002Fdiv>\n          <div class=\"card-location\">Ireland → New York Harbor<\u002Fdiv>\n          <div class=\"card-summary\">The siblings do not travel together. Patrick and Bridget sail first, establishing the chain-migration beachhead Michael will follow a year later.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Passenger list evidence links the earliest Copley arrivals to the ship <em>Kutusoff<\u002Fem> in 1837. New York is only the entry point — not the destination. Work was the destination: rail grades, canals, and labor camps pulling immigrants inland. Their first American years likely alternated between temporary boarding, camp labor, and the support network of already-arrived Irish neighbors.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><span class=\"tag\">Immigration<\u002Fspan><span class=\"tag\">Ship manifest<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://www.archives.gov/research/immigration\" target=\"_blank\">→ NARA Immigration Records<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1838 Michael crosses -->\n    <div class=\"event-row\" data-tags=\"immigration people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1838<\u002Fdiv>\n          <div class=\"card-title\">Michael Crosses — Listed as \"Copely\"<\u002Fdiv>\n          <div class=\"card-location\">Ireland → New York (aboard <em>Powhatan<\u002Fem>)<\u002Fdiv>\n          <div class=\"card-summary\">Michael follows his siblings across the Atlantic, his name recorded with the variant spelling \"Copely\" — a phonetic transcription that would later help researchers identify the entry.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The <em>Powhatan<\u002Fem> manifest records \"Copely\" rather than \"Copley\" — a minor but significant detail. Phonetic spelling of Irish surnames was standard practice; the same variation appears in Irish civil records for William Copely of Kilgefin, reinforcing the connection. After arrival, Michael's path moves inland along labor corridors, following connections established by Patrick and Bridget the year before. Within five years he will have secured his first American land.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><span class=\"tag\">Immigration<\u002Fspan><span class=\"tag\">Ship manifest<\u002Fspan><span class=\"tag\">G23<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1845 Great Famine -->\n    <div class=\"world-event-row we-ie\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇮🇪<\u002Fspan><span class=\"we-year\">1845–52<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Great Famine: ~1M dead, ~2M emigrate — the Copleys left <em>before<\u002Fem> this<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 3 — RAILROAD DAYS ══════════════ -->\n    <div class=\"chapter\" id=\"ch3\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">III — Railroad Days &amp; Roots in West Virginia<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- B&O context -->\n    <div class=\"event-row\" data-tags=\"west-virginia immigration\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span style=\"background:var(--ink-faint); box-shadow:0 0 0 2px var(--ink-faint)\"><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card context-card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">c. 1838–1842<\u002Fdiv>\n          <div class=\"card-title\">B&amp;O Railroad Labor Phase<\u002Fdiv>\n          <div class=\"card-location\">Mid-Atlantic states → West Virginia corridor<\u002Fdiv>\n          <div class=\"card-summary\">Irish immigrants were the backbone of B&amp;O Railroad construction — the likely avenue by which the Copleys moved from New York into the interior of what would become West Virginia.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Historical context<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The B&amp;O Railroad's westward expansion through the 1840s–50s drew thousands of Irish immigrant laborers into the region. The dangerous manual work — blasting, grading, timber-cutting — paid wages that could be saved toward land. The oral tradition of the Copley family follows this exact pattern. No specific payroll record for Michael has been found yet, but the contextual fit is strong (Research Q5).<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><span class=\"tag\">B&amp;O Railroad<\u002Fspan><span class=\"tag\">Context<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://www.wvencyclopedia.org/entries/830\" target=\"_blank\">→ e-WV: Irish in West Virginia<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1843 land + John born -->\n    <div class=\"event-row\" data-tags=\"west-virginia people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1843<\u002Fdiv>\n          <div class=\"card-title\">Land Agreement &amp; John Copley Born<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia (then Virginia)<\u002Fdiv>\n          <div class=\"card-summary\">A watershed year: Michael and Patrick sign a 200-acre agreement with Weeden Hoffman, and John Copley — who will hold the family line into the next century — is born.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The 200-acre agreement with Weeden Hoffman was not just a contract — it was the Copley family's commitment to America. If rail labor gave them entry, land gave them permanence. Patrick Copley is co-purchaser, confirming both brothers were working together in Lewis County by this date.<\u002Fp>\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">John Copley<\u002Fspan><span class=\"person-dates\">1843–1925<\u002Fspan><span class=\"person-desc\">— son of Michael and Ann; inherits the family farm; marries Mary Ellen Dolan<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">Land<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><span class=\"tag\">G23/G24<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1848 Gold Rush -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1848<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">California Gold Rush begins; US expands to Pacific Coast<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Family life 1843-1880s -->\n    <div class=\"event-row\" data-tags=\"west-virginia\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1843–1880s<\u002Fdiv>\n          <div class=\"card-title\">Family Life in Lewis County<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Michael and Ann build their American life: field seasons, Catholic faith, a large family, and a community identity forged in the hill country between the Monongahela and the B&amp;O line.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Michael and Ann raise a large family in Lewis County, including Mary Copley Quinn, John Copley, Catherine \"Kitty\" (named after Michael's Irish sister), Anne, Bridget \"Bitty\" Copley Gillooly, Margaret, Thomas \"Tom,\" and Sarah.<\u002Fp>\n            <p>The family's Catholic faith — carried from Kilgefin — continues as a community anchor, where Irish Catholic settlement was part of a broader pattern of immigrant community formation around the B&amp;O corridor.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-plausible\">⚠️ Plausible<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><span class=\"tag\">G23/G24<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1855 Mary Ellen born -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1855<\u002Fdiv>\n          <div class=\"card-title\">Mary Ellen Dolan Born<\u002Fdiv>\n          <div class=\"card-location\">Lewis County / Moundsville area, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Mary Ellen Dolan — future wife of John Copley and mother of five — is born into the Dolan family of West Virginia.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Mary Ellen Dolan (1855–1901) came from the family of Michael Dolan (1824–1888) and Elizabeth Dolan (1829–1913). She married John Copley and bore five surviving children: Thomas E. (1892), Mary (later Flesch), Anne, Ellen Bernadine \"Nelle\" (1897), and Michael Joseph (1898). She died in 1901, just a year after the oil strike on family land.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">Dolan family<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1861 Civil War -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1861<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Civil War begins; Copley family in the middle of contested Virginia<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Civil War context -->\n    <div class=\"event-row\" data-tags=\"west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card context-card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1861–1865<\u002Fdiv>\n          <div class=\"card-title\">Civil War Era — West Virginia Created<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">West Virginia is carved from Virginia and admitted to the Union in 1863. John Copley, age 18–22, lives through the war. A Quartermaster claim in the research files hints at family military involvement.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Historical context<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Lewis County was contested territory during the Civil War. West Virginia's creation as a Union state in 1863 was directly tied to the divided loyalties of western Virginia counties. The Copley family would have experienced this at close range. Research Q28 documents an unresolved \"Quartermaster claim\" possibly linked to John Copley — a thread that could significantly expand the family's Civil War story if documented.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-speculative\">❓ Speculative (military claim)<\u002Fspan><span class=\"tag\">Civil War<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span style=\"background:var(--ink-faint); box-shadow:0 0 0 2px var(--ink-faint)\"><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1863 WV statehood + Emancipation -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1863<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">West Virginia admitted to Union; Emancipation Proclamation<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1865 Patrick dies -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1865<\u002Fdiv>\n          <div class=\"card-title\">Patrick Copley Dies<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Patrick — Michael's brother, co-purchaser of the 1843 land, and the first of the siblings to sail for America — dies in Lewis County at the Civil War's end.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Patrick's death in 1865 — the same year the Civil War ended — closes the chapter on one of the most important figures in the early American story. As co-signer of the 1843 land agreement, he was integral to establishing the family's first foothold. A stronger documentary profile beyond the land reference remains an open research priority.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G23<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1865 Civil War ends + 13th Amendment -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1865<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Civil War ends; 13th Amendment abolishes slavery<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1869 Transcontinental Railroad -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1869<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Transcontinental Railroad completed; nation connected coast to coast<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1879 Irish Land War -->\n    <div class=\"world-event-row we-ie\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇮🇪<\u002Fspan><span class=\"we-year\">1879–82<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Irish Land War: agrarian unrest &amp; Land League campaigns<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1886 Statue of Liberty -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1886<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Statue of Liberty dedicated in New York Harbor<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1892–1898 Children of John born -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1892–1898<\u002Fdiv>\n          <div class=\"card-title\">John &amp; Mary Ellen's Children Born<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Five children are born to John and Mary Ellen in the final decade of the 19th century — the generation that will carry the family into professional America.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Thomas E. Copley<\u002Fspan><span class=\"person-dates\">1892–1968<\u002Fspan><span class=\"person-desc\">— married Drusilla; no documented children<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Mary Copley Flesch<\u002Fspan><span class=\"person-dates\">dates unclear<\u002Fspan><span class=\"person-desc\">— later associated with Albuquerque, NM<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Anne Copley<\u002Fspan><span class=\"person-dates\">dates unclear<\u002Fspan><span class=\"person-desc\">— relocated to Albuquerque; reportedly unmarried<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Ellen Bernadine \"Nelle\" Copley Sardo<\u002Fspan><span class=\"person-dates\">1897–1977<\u002Fspan><span class=\"person-desc\">— registered nurse, educator; Maryland branch matriarch<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Michael Joseph Copley<\u002Fspan><span class=\"person-dates\">1898–1988<\u002Fspan><span class=\"person-desc\">— research chemist; BS Catholic Univ.; PhD U of Illinois; USDA leadership<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1897 Michael Sr. dies -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1897<\u002Fdiv>\n          <div class=\"card-title\">Michael Copley Sr. Dies, Age ~84<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">The patriarch who crossed the Atlantic in 1838 dies in Lewis County after nearly 60 years in America. His gravestone's recorded birthplace of Kilgefin, Roscommon remains the most important single clue in the Irish-origins research.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Michael Copley Sr. (1813–1897) arrived in America with a staggered family migration, secured 200 acres of West Virginia land, and raised the generation that would benefit from the 1900 oil strike — though he did not live to see it. Open questions remain around his parentage (Q1), marriage record (Q3), and naturalization (Q19).<\u002Fp>\n            <div class=\"callout\">The Kilgefin gravestone notation is currently the primary anchor connecting the American family to the parish where the 2026 breakthrough found the Catholic Copely family.<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G23<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1898 Spanish-American War -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1898<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Spanish-American War; US becomes a global power<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 4 — OIL & LOSS ══════════════ -->\n    <div class=\"chapter\" id=\"ch4\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">IV — Oil &amp; Loss (1900–1909)<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sep 1900 oil strike -->\n    <div class=\"event-row\" data-tags=\"oil west-virginia\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">September 1900<\u002Fdiv>\n          <div class=\"card-title\">Copley No. 1 — The Oil Strike<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia (family land)<\u002Fdiv>\n          <div class=\"card-summary\">South Penn Oil's Copley No. 1 well comes in at ~4,800 barrels per day — one of the largest strikes in Lewis County history. Black flow overruns creek beds. A frontier farming family's fortunes are transformed overnight.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>The Copley No. 1 well, drilled by South Penn Oil on family land in September 1900, was a landmark event in West Virginia petroleum history. At roughly 4,800 barrels per day, it was spectacle as much as commerce. The exact lease terms, lifetime royalties, and heir distribution remain open research questions (Q24–Q26). But the revenues almost certainly financed the education of John's children in ways impossible on farm income alone.<\u002Fp>\n            <div class=\"callout\">The pathway from oil royalties → university education → professional careers is the most likely explanation for why, within one generation, the family moved from subsistence farming to federal scientific leadership.<\u002Fdiv>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">Oil<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><span class=\"tag\">G24<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://zcopley.github.io/copley-family-research/Topics/1900-Copley-Oil-Strike\" target=\"_blank\">→ 1900 Copley Oil Strike (full topic page)<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1901 Mary Ellen dies -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1901<\u002Fdiv>\n          <div class=\"card-title\">Mary Ellen Dolan Copley Dies<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">John's wife and the mother of five young children dies at 46 — just a year after the oil strike. John is left to raise the children alone amidst transformed circumstances.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Mary Ellen Dolan Copley (1855–1901) died the year after the Copley No. 1 strike — leaving John Copley to raise Thomas E. (9), Nelle (4), Michael Joseph (3), Mary, and Anne. The timing — grief and sudden wealth arriving simultaneously — would have shaped the family's next decade profoundly. Research Q31 tracks the need to expand her death record.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1903 Wright Brothers -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1903<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Wright Brothers' first powered flight, Kitty Hawk, North Carolina<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1909 Ann dies -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1909<\u002Fdiv>\n          <div class=\"card-title\">Ann Copley Dies, Age ~86<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Ann Elizabeth Munday Copley — who crossed from County Fermanagh to become the matriarch of a West Virginia family — dies after more than 70 years in America.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Ann Copley (1823–1909) lived to see the American story she and Michael built expand through three generations: the B&amp;O labor years, the farm, the land agreement, the large family, the oil strike, and her grandchildren beginning to enter university. Her 86 years bridge pre-Famine Ireland and the dawn of modern American life.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G23<\u002Fspan><span class=\"tag\">Matriarch<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1914 WWI -->\n    <div class=\"world-event-row we-world\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🌍<\u002Fspan><span class=\"we-year\">1914<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">World War I begins in Europe<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1916 Easter Rising -->\n    <div class=\"world-event-row we-ie\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇮🇪<\u002Fspan><span class=\"we-year\">1916<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Easter Rising, Dublin — Irish republicans declare independence<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1917 US enters WWI -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1917<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">US enters WWI — Nelle (20) and Michael Joseph (19) of age to serve<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1918 Spanish Flu -->\n    <div class=\"world-event-row we-world\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🌍<\u002Fspan><span class=\"we-year\">1918<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Spanish Flu pandemic kills ~50M worldwide<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ══════════════ CHAPTER 5 — NEW GENERATIONS ══════════════ -->\n    <div class=\"chapter\" id=\"ch5\">\n      <div class=\"chapter-rule\"><\u002Fdiv>\n      <div class=\"chapter-label\">V — New Generations (G24 → G25)<\u002Fdiv>\n      <div class=\"chapter-rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1920 Women's Suffrage -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1920<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">19th Amendment: women's suffrage; Prohibition begins<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1922 Irish Free State -->\n    <div class=\"world-event-row we-ie\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇮🇪<\u002Fspan><span class=\"we-year\">1922<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Irish Free State established — the Copleys' homeland becomes a new republic<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Nelle + MJC educated -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1910s–1920s<\u002Fdiv>\n          <div class=\"card-title\">Nelle &amp; Michael Joseph Educated<\u002Fdiv>\n          <div class=\"card-location\">Baltimore · Washington D.C. · Champaign, Illinois<\u002Fdiv>\n          <div class=\"card-summary\">John's youngest children pursue advanced education — Nelle as a registered nurse and educator; Michael Joseph through a chemistry PhD at the University of Illinois.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Nelle Copley<\u002Fspan><span class=\"person-dates\">b. Dec 23, 1897<\u002Fspan><span class=\"person-desc\">— Registered nurse and educator; Maryland branch matriarch<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Michael Joseph Copley<\u002Fspan><span class=\"person-dates\">b. Sep 16, 1898<\u002Fspan><span class=\"person-desc\">— BS, Catholic University of America; PhD, University of Illinois; USDA Director of Research<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin-top:0.6rem\">The arc from immigrant laborer (1838) to federal scientist (1940s) spans exactly 100 years — almost certainly enabled by oil royalty wealth.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">Education<\u002Fspan><span class=\"tag\">Science<\u002Fspan><\u002Fdiv>\n            <a class=\"source-link\" href=\"https://ancestors.familysearch.org/en/MVDR-37G/michael-joseph-copley-1898-1988\" target=\"_blank\">→ Michael Joseph Copley — FamilySearch<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sep 6, 1925 John dies -->\n    <div class=\"event-row\" data-tags=\"people west-virginia\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">September 6, 1925<\u002Fdiv>\n          <div class=\"card-title\">John Copley Dies, Age 81<\u002Fdiv>\n          <div class=\"card-location\">Lewis County, West Virginia<\u002Fdiv>\n          <div class=\"card-summary\">Born November 3, 1843 — died September 6, 1925. The man who held the family line from the pioneer generation through the oil boom passes after 82 years. His children are already scattered across America.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>John Copley (Nov 3, 1843 – Sep 6, 1925) lived through the Civil War, the creation of West Virginia, the death of his wife Mary Ellen in 1901, the Copley No. 1 oil strike, and watched his children leave Lewis County for cities across America. His 81-year life is the central spine of the family's American narrative.<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G23/G24<\u002Fspan><span class=\"tag\">West Virginia<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WORLD: 1929 Great Depression -->\n    <div class=\"world-event-row we-us\" data-tags=\"world\">\n      <div class=\"world-event-inner\">\n        <div class=\"we-side we-left\"><div class=\"we-pill\"><span class=\"we-flag\">🇺🇸<\u002Fspan><span class=\"we-year\">1929<\u002Fspan><span class=\"we-sep\">—<\u002Fspan><span class=\"we-text\">Wall Street Crash; Great Depression begins<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"we-center\"><span><\u002Fspan><\u002Fdiv>\n        <div class=\"we-side we-right\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1931 Nelle marries Sardo -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">August 16, 1931<\u002Fdiv>\n          <div class=\"card-title\">Nelle Copley Marries Dr. Robert Samuel Sardo<\u002Fdiv>\n          <div class=\"card-location\">Maryland<\u002Fdiv>\n          <div class=\"card-summary\">Ellen Bernadine \"Nelle\" Copley marries Robert Samuel Sardo, a physician — the first of the G24 siblings to marry. Their Maryland branch will extend the family into the Sardo and Arena lines.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <p>Nelle (b. Dec 23, 1897) and Robert Samuel Sardo wed on August 16, 1931 — in the depths of the Great Depression. Robert was a physician; Nelle was a registered nurse and educator. Together they build the Maryland branch of the family, having two daughters: Sarah Ellen (b. 1933) and Mary Carmella (b. 1936).<\u002Fp>\n            <div class=\"detail-row\"><span class=\"confidence conf-verified\">✅ Verified<\u002Fspan><span class=\"tag\">G24<\u002Fspan><span class=\"tag\">Marriage<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1933 Sarah Sardo born + Michael Joseph marries -->\n    <div class=\"event-row\" data-tags=\"people\">\n      <div class=\"event-left\"><\u002Fdiv>\n      <div class=\"event-dot\"><span><\u002Fspan><\u002Fdiv>\n      <div class=\"event-right\">\n        <div class=\"card\" onclick=\"toggleCard(this)\">\n          <div class=\"card-year\">1933<\u002Fdiv>\n          <div class=\"card-title\">Sarah Sardo Born &amp; Michael Joseph Marries<\u002Fdiv>\n          <div class=\"card-location\">Maryland · Washington D.C.<\u002Fdiv>\n          <div class=\"card-summary\">Sarah Ellen Sardo is born to Nelle and Robert on December 19. The same year, Michael Joseph Copley marries Marion Elizabeth Partlow.<\u002Fdiv>\n          <div class=\"card-toggle\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2 4l4 4 4-4\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Click to expand<\u002Fdiv>\n          <div class=\"card-detail\">\n            <div class=\"people-list\">\n              <div class=\"person-item\"><span class=\"person-name\">Sarah Ellen Sardo<\u002Fspan><span class=\"person-dates\">b. Dec 19, 1933<\u002Fspan><span class=\"person-desc\">— daughter of Nelle; later marries Matthew Paul Arena (Nov 1956); Arena branch matriarch<\u002Fspan><\u002Fdiv>\n              <div class=\"person-item\"><span class=\"person-name\">Marion Elizabeth Partlow<\u002Fspan><span class=\"person-dates\">m. 1933, d. 1977<\u002Fspan><span class=\"person-desc\">— wife of Michael Joseph Copley; mother of Stephen Michael and Thomas Partlow Copley<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"detail-row\"><span class=\
